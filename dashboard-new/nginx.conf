server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolve at runtime, not startup
    resolver 127.0.0.11 valid=10s;
    set $orchestrator_upstream http://orchestrator:6000;

    # ── API → orchestrator ──
    location /auth/ {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /chat {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location ~ ^/chat/[a-f0-9-]+/(messages|delete)$ {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /ws/ {
        proxy_pass $orchestrator_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /status {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /health {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location = /chat/sessions {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /workspace/ {
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # SPA fallback — everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
