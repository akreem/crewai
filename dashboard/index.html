<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel</title>
<style>
  :root {
    --gray-50: #fafafa;
    --gray-100: #f0f0f0;
    --gray-200: #e5e5e5;
    --gray-300: #d4d4d4;
    --gray-400: #a3a3a3;
    --gray-500: #737373;
    --gray-600: #525252;
    --gray-700: #404040;
    --gray-800: #303030;
    --gray-850: #2a2a2a;
    --gray-900: #212121;
    --gray-950: #171717;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', ui-sans-serif, system-ui, 'Segoe UI', Roboto, Ubuntu, sans-serif;
    background: var(--gray-950);
    color: #eee;
    height: 100vh;
    overflow: hidden;
  }
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--gray-900);
    display: flex; flex-direction: column;
    border-right: 1px solid var(--gray-850);
    transition: margin-left .2s;
  }
  .sidebar.collapsed { margin-left: -260px; }
  .sidebar-header {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-header .logo { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
  .sidebar-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; border: none;
    background: transparent; color: var(--gray-400);
    cursor: pointer; font-size: 18px;
    transition: background .15s, color .15s;
  }
  .sidebar-btn:hover { background: var(--gray-800); color: #fff; }
  .new-chat {
    margin: 0 12px 8px; padding: 10px 14px;
    background: transparent; border: 1px solid var(--gray-700);
    border-radius: 10px; color: #eee;
    font-size: 13px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .15s;
  }
  .new-chat:hover { background: var(--gray-800); }
  .new-chat svg { width: 16px; height: 16px; }
  .sidebar-label {
    padding: 12px 16px 6px; font-size: 11px; font-weight: 600;
    color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em;
  }
  .chat-list {
    list-style: none; flex: 1; overflow-y: auto; padding: 0 8px;
  }
  .chat-list li {
    padding: 9px 12px; border-radius: 8px; font-size: 13px;
    color: var(--gray-400); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 1px; transition: background .12s, color .12s;
    display: flex; align-items: center; gap: 6px;
  }
  .chat-list li:hover { background: var(--gray-850); color: #eee; }
  .chat-list li.active { background: var(--gray-850); color: #fff; }
  .chat-list .title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .chat-list .del {
    flex-shrink: 0; opacity: 0; color: var(--gray-500);
    font-size: 15px; padding: 0 2px;
    border: none; background: none; cursor: pointer;
    transition: opacity .15s;
  }
  .chat-list li:hover .del { opacity: 1; }
  .chat-list .del:hover { color: #ef4444; }
  .files-section {
    border-top: 1px solid var(--gray-850);
    max-height: 180px; display: flex; flex-direction: column;
  }
  .file-list { list-style: none; overflow-y: auto; padding: 0 8px 8px; }
  .file-list li {
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
    color: var(--gray-400); cursor: pointer; transition: background .12s;
  }
  .file-list li:hover { background: var(--gray-850); color: #eee; }
  .sidebar-footer {
    padding: 10px 16px; border-top: 1px solid var(--gray-850);
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--gray-500);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: #22c55e; }
  .dot.err { background: #ef4444; }
  .dot.warn { background: #eab308; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--gray-950); }
  .topbar {
    height: 48px; display: flex; align-items: center;
    padding: 0 16px; gap: 8px; flex-shrink: 0;
  }
  .toggle-sidebar {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; border: none;
    background: transparent; color: var(--gray-400);
    cursor: pointer; font-size: 18px;
  }
  .toggle-sidebar:hover { background: var(--gray-800); color: #fff; }
  .topbar-title { font-size: 14px; font-weight: 500; color: var(--gray-300); }
  .messages { flex: 1; overflow-y: auto; padding: 0; }
  .messages-inner {
    max-width: 48rem; margin: 0 auto;
    padding: 24px 20px 16px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .msg-row { display: flex; gap: 14px; align-items: flex-start; }
  .msg-row.user { justify-content: flex-end; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .msg-avatar.assistant-av { background: var(--gray-800); color: #fff; }
  .msg-content {
    font-size: 14px; line-height: 1.7; color: #e0e0e0;
    white-space: pre-wrap; word-break: break-word; max-width: 85%;
  }
  .msg-row.user .msg-content {
    background: var(--gray-800); padding: 10px 16px;
    border-radius: 20px 20px 4px 20px; color: #fff;
  }
  .msg-row.assistant .msg-content { color: #d4d4d4; }
  .system-msg { text-align: center; font-size: 12px; color: var(--gray-500); padding: 4px 0; }
  .agent-card {
    background: var(--gray-900); border: 1px solid var(--gray-800);
    border-radius: 12px; padding: 14px 18px; max-width: 85%;
  }
  .agent-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .agent-card.error .agent-dot { background: #ef4444; }
  .agent-card-name {
    font-size: 12px; font-weight: 600; color: #fff;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .agent-card-body {
    font-size: 13px; color: var(--gray-400); line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
  }
  .agent-card-body.collapsed {
    max-height: 120px; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
  }
  .report-card {
    background: var(--gray-900); border: 1px solid var(--gray-800);
    border-radius: 12px; padding: 14px 18px; max-width: 90%;
  }
  .report-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    padding-bottom: 8px; border-bottom: 1px solid var(--gray-800);
  }
  .report-card-header svg { width: 16px; height: 16px; color: var(--gray-400); flex-shrink: 0; }
  .report-card-title { font-size: 13px; font-weight: 600; color: #fff; flex: 1; }
  .report-card-body {
    font-size: 13px; color: var(--gray-300); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }
  .report-card-body.collapsed {
    max-height: 200px; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
  }
  .report-actions {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--gray-800);
  }
  .copy-btn {
    background: none; border: none; color: var(--gray-500);
    cursor: pointer; padding: 2px 4px; border-radius: 4px;
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; transition: color .15s;
  }
  .copy-btn:hover { color: #fff; }
  .msg-row.assistant { position: relative; }
  .msg-row.assistant .msg-actions {
    display: flex; gap: 4px; margin-top: 4px; opacity: 0;
    transition: opacity .15s;
  }
  .msg-row.assistant:hover .msg-actions { opacity: 1; }
  .agent-card { position: relative; }
  .agent-card .copy-btn {
    position: absolute; top: 12px; right: 12px;
    opacity: 0; transition: opacity .15s;
  }
  .agent-card:hover .copy-btn { opacity: 1; }
  .agent-action-btn {
    background: var(--gray-800); border: 1px solid var(--gray-700);
    color: var(--gray-300); padding: 6px 12px;
    border-radius: 8px; font-size: 12px; font-weight: 500;
    cursor: pointer; display: inline-flex;
    align-items: center; gap: 6px; transition: background .15s, color .15s;
  }
  .agent-action-btn:hover { background: var(--gray-700); color: #fff; }
  .see-more {
    display: inline-block; margin-top: 6px;
    font-size: 12px; font-weight: 600; color: var(--gray-400);
    cursor: pointer; border: none; background: none;
    padding: 0; transition: color .15s;
  }
  .see-more:hover { color: #fff; }
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--gray-500); padding: 40px;
  }
  .welcome-title { font-size: 28px; font-weight: 700; color: #fff; }
  .welcome-sub { font-size: 14px; color: var(--gray-500); }
  .typing-row { display: flex; gap: 14px; align-items: center; }
  .typing-dot-group { display: flex; gap: 3px; align-items: center; }
  .typing-dot-group span {
    width: 6px; height: 6px; background: var(--gray-500);
    border-radius: 50%; animation: pulse 1.4s infinite;
  }
  .typing-dot-group span:nth-child(2) { animation-delay: .2s; }
  .typing-dot-group span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  .typing-label { font-size: 13px; color: var(--gray-500); }
  .input-area { padding: 0 20px 20px; flex-shrink: 0; }
  .input-container {
    max-width: 48rem; margin: 0 auto;
    background: var(--gray-900); border: 1px solid var(--gray-800);
    border-radius: 16px; padding: 8px;
    display: flex; align-items: flex-end; gap: 6px;
    transition: border-color .2s;
  }
  .input-container:focus-within { border-color: var(--gray-600); }
  .input-container textarea {
    flex: 1; background: transparent; border: none; outline: none;
    color: #eee; font-size: 14px; font-family: inherit;
    resize: none; padding: 8px 10px;
    min-height: 24px; max-height: 150px; line-height: 1.5;
  }
  .input-container textarea::placeholder { color: var(--gray-600); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: none; background: #fff; color: #000;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: opacity .15s;
  }
  .send-btn:disabled { opacity: .2; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--gray-900); border: 1px solid var(--gray-800);
    border-radius: 16px; width: min(800px, 92vw); max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 25px 50px rgba(0,0,0,.5);
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--gray-800);
    display: flex; align-items: center; font-weight: 600; font-size: 14px; color: #fff;
  }
  .modal-close {
    margin-left: auto; background: none; border: none;
    color: var(--gray-500); cursor: pointer; font-size: 20px;
    padding: 4px 8px; border-radius: 6px;
  }
  .modal-close:hover { background: var(--gray-800); color: #fff; }
  .modal-body {
    padding: 20px; overflow-y: auto;
    font-family: 'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
    font-size: 12px; line-height: 1.7; white-space: pre-wrap;
    word-break: break-word; color: var(--gray-300);
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(67,67,67,.5); border-radius: 9999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(67,67,67,.8); }
  @media (max-width: 768px) {
    .sidebar { position: fixed; z-index: 50; height: 100vh; left: 0; top: 0; }
    .sidebar.collapsed { margin-left: -260px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">Sentinel</span>
      <button class="sidebar-btn" onclick="toggleSidebar()" title="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
    </div>
    <button class="new-chat" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Chat
    </button>
    <div class="sidebar-label">Recent</div>
    <ul class="chat-list" id="chat-list"></ul>
    <div class="files-section">
      <div class="sidebar-label">Workspace</div>
      <ul class="file-list" id="file-list"></ul>
    </div>
    <div class="sidebar-footer" id="status-badge">
      <span class="dot err"></span>
      <span>Checking agents...</span>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">New Chat</span>
    </div>
    <div class="messages" id="messages">
      <div class="messages-inner" id="messages-inner">
        <div class="welcome" id="welcome">
          <div class="welcome-title">Sentinel</div>
          <div class="welcome-sub">Multi-agent SRE &amp; Security platform. Start a conversation below.</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-container">
        <textarea id="input" placeholder="Send a message" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="modal-title">File</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script>
var API = location.origin;
var WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/chat';
var currentSession = null;
var sending = false;
var ws = null;
var typingEl = null;
var _$ = function(id) { return document.getElementById(id); };
var inputEl = _$('input');
var sendBtn = _$('send-btn');
var messagesEl = _$('messages');
var innerEl = _$('messages-inner');
var welcomeEl = _$('welcome');
var chatListEl = _$('chat-list');
var fileListEl = _$('file-list');
var statusEl = _$('status-badge');
var sidebarEl = _$('sidebar');
var topTitle = _$('topbar-title');

inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function toggleSidebar() { sidebarEl.classList.toggle('collapsed'); }

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = function() { console.log('[ws] connected'); };
  ws.onclose = function() { console.log('[ws] closed'); setTimeout(connectWS, 2000); };
  ws.onerror = function() {};
  ws.onmessage = function(evt) {
    var d = JSON.parse(evt.data);
    switch (d.event) {
      case 'session':
        currentSession = d.session_id;
        topTitle.textContent = d.title || 'Chat';
        loadSessions();
        break;
      case 'phase':
        if (d.phase === 'thinking') setTyping('Thinking');
        else if (d.phase === 'executing') setTyping('Executing');
        else if (d.phase === 'documenting') setTyping('Scribe documenting');
        else if (d.phase === 'summarizing') setTyping('Writing summary');
        else if (d.phase === 'done') {
          clearTyping(); addSystem('Execution complete');
          unlock(); loadSessions(); refreshFiles();
        } else if (d.phase === 'chat') { clearTyping(); unlock(); }
        break;
      case 'reply':
        clearTyping();
        if (d.content) addAssistant(d.content);
        unlock();
        break;
      case 'agent_start':
        clearTyping();
        setTyping((d.agent||'').toUpperCase() + ' working');
        break;
      case 'agent_done':
        clearTyping(); addAgentCard(d);
        break;
      case 'scribe_report':
        addScribeReport(d);
        break;
      case 'error':
        clearTyping();
        addSystem('Error: ' + (d.message || 'Unknown'));
        unlock();
        break;
    }
  };
}

function unlock() { sending = false; sendBtn.disabled = false; }

function sendMessage() {
  var text = inputEl.value.trim();
  if (!text || sending || !ws || ws.readyState !== 1) return;
  sending = true;
  sendBtn.disabled = true;
  if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
  addUser(text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  ws.send(JSON.stringify({ message: text, session_id: currentSession }));
}

function addUser(text) {
  var row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = '<div class="msg-content">' + esc(text) + '</div>';
  innerEl.appendChild(row);
  scrollDown();
}

function addAssistant(text, animate) {
  var row = document.createElement('div');
  row.className = 'msg-row assistant';
  var content = document.createElement('div');
  content.className = 'msg-content';
  row.innerHTML = '<div class="msg-avatar assistant-av">S</div>';
  row.appendChild(content);
  innerEl.appendChild(row);
  var actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = '<button class="copy-btn" onclick="copyText(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>';
  row.appendChild(actions);
  if (animate !== false) {
    typeWriter(content, text, 0);
  } else {
    content.textContent = text;
    scrollDown();
  }
}

function typeWriter(el, text, i) {
  if (i < text.length) {
    var chunk = text.substr(i, 24);
    el.textContent += chunk;
    scrollDown();
    setTimeout(function() { typeWriter(el, text, i + 24); }, 12);
  }
}

function addSystem(text) {
  var div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  innerEl.appendChild(div);
  scrollDown();
}

function addAgentCard(report) {
  var card = document.createElement('div');
  var hasErr = !!report.error;
  card.className = 'agent-card' + (hasErr ? ' error' : '');
  var body = '';
  if (hasErr) body = 'Error: ' + report.error;
  else {
    if (report.summary) body = report.summary;
    if (report.output_file) body += (body ? '\n' : '') + 'File: ' + report.output_file;
  }
  var header = '<div class="agent-card-header"><div class="agent-dot"></div><div class="agent-card-name">' + esc((report.agent||'').toUpperCase()) + '</div></div>' +
    '<button class="copy-btn" onclick="copyText(this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>';
  var needsCollapse = body.length > 500;
  var bodyDiv = document.createElement('div');
  bodyDiv.className = 'agent-card-body' + (needsCollapse ? ' collapsed' : '');
  bodyDiv.textContent = body;
  card.innerHTML = header;
  card.appendChild(bodyDiv);
  if (needsCollapse) {
    var btn = document.createElement('button');
    btn.className = 'see-more';
    btn.textContent = 'See more';
    btn.onclick = function() {
      var isCollapsed = bodyDiv.classList.toggle('collapsed');
      btn.textContent = isCollapsed ? 'See more' : 'See less';
    };
    card.appendChild(btn);
  }
  innerEl.appendChild(card);
  scrollDown();
}

function setTyping(label) {
  clearTyping();
  var row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  row.innerHTML = '<div class="msg-avatar assistant-av">S</div><div class="typing-dot-group"><span></span><span></span><span></span></div><div class="typing-label">' + esc(label) + '</div>';
  innerEl.appendChild(row);
  scrollDown();
  typingEl = row;
}

function clearTyping() {
  if (typingEl && typingEl.parentNode) typingEl.remove();
  typingEl = null;
}

function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function loadSessions() {
  fetch(API + '/chat/sessions')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      chatListEl.innerHTML = '';
      (d.sessions || []).forEach(function(s) {
        var li = document.createElement('li');
        if (s.session_id === currentSession) li.classList.add('active');
        var span = document.createElement('span');
        span.className = 'title';
        span.textContent = s.title || 'Untitled';
        var btn = document.createElement('button');
        btn.className = 'del';
        btn.innerHTML = '&times;';
        btn.onclick = function(e) { e.stopPropagation(); deleteChat(s.session_id); };
        li.appendChild(span);
        li.appendChild(btn);
        li.onclick = function() { openChat(s.session_id); };
        chatListEl.appendChild(li);
      });
    }).catch(function() {});
}

function openChat(sid) {
  fetch(API + '/chat/' + sid + '/messages')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      currentSession = sid;
      topTitle.textContent = d.title || 'Chat';
      innerEl.innerHTML = '';
      (d.messages || []).forEach(function(m) {
        if (m.role === 'user') addUser(m.content);
        else if (m.role === 'assistant') addAssistant(m.content, false);
      });
      loadSessions();
      inputEl.focus();
    }).catch(function(e) { addSystem('Failed to load chat'); });
}

function newChat() {
  currentSession = null;
  topTitle.textContent = 'New Chat';
  innerEl.innerHTML = '';
  innerEl.appendChild(welcomeEl);
  chatListEl.querySelectorAll('li').forEach(function(li) { li.classList.remove('active'); });
  inputEl.focus();
}

function deleteChat(sid) {
  fetch(API + '/chat/' + sid, { method: 'DELETE' })
    .then(function() {
      if (currentSession === sid) newChat();
      loadSessions();
    }).catch(function() {});
}

function refreshStatus() {
  fetch(API + '/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var agents = ['watchman','shield','scribe'];
      var online = agents.filter(function(a) { return d[a] && d[a].status === 'ok'; }).length;
      var all = online === agents.length;
      statusEl.innerHTML = '<span class="dot ' + (all ? 'ok' : online > 0 ? 'warn' : 'err') + '"></span><span>' + (all ? 'All agents online' : online + '/' + agents.length + ' agents online') + '</span>';
    }).catch(function() {
      statusEl.innerHTML = '<span class="dot err"></span><span>Offline</span>';
    });
}

var filePath = '';
function refreshFiles(dir) {
  dir = dir || '';
  filePath = dir;
  var url = dir ? API + '/workspace/files?path=' + encodeURIComponent(dir) : API + '/workspace/files';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var html = '';
      if (dir) html += '<li onclick="refreshFiles(\'\')" style="color:#a3a3a3">&larr; Back</li>';
      if (!d.files || !d.files.length) { html += '<li style="cursor:default;color:var(--gray-600)">Empty</li>'; }
      else d.files.forEach(function(f) {
        if (f.type === 'directory')
          html += '<li onclick="refreshFiles(\'' + ea(f.path) + '\')" style="color:var(--gray-300)">&#128193; ' + esc(f.name) + '</li>';
        else
          html += '<li onclick="viewFile(\'' + ea(f.path) + '\')">' + esc(f.name) + '</li>';
      });
      fileListEl.innerHTML = html;
    }).catch(function() { fileListEl.innerHTML = '<li style="cursor:default;color:var(--gray-600)">Error</li>'; });
}

function viewFile(fp) {
  _$('modal-overlay').classList.add('active');
  _$('modal-title').textContent = fp.split('/').pop();
  _$('modal-body').textContent = 'Loading...';
  fetch(API + '/workspace/files/' + encodeURIComponent(fp))
    .then(function(r) { return r.json(); })
    .then(function(d) { _$('modal-body').textContent = d.content; })
    .catch(function(e) { _$('modal-body').textContent = 'Error loading file'; });
}
function closeModal(e) {
  if (e && e.target !== _$('modal-overlay')) return;
  _$('modal-overlay').classList.remove('active');
}

function esc(s) { var d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function ea(s) { return (s||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  return Promise.resolve();
}

function copyText(btn) {
  var card = btn.closest('.agent-card') || btn.closest('.msg-row') || btn.closest('.report-card');
  var el = card.querySelector('.agent-card-body') || card.querySelector('.msg-content') || card.querySelector('.report-card-body');
  if (!el) return;
  copyToClipboard(el.textContent).then(function() {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(function() {
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    }, 1500);
  });
}

function addScribeReport(d) {
  var card = document.createElement('div');
  card.className = 'report-card';
  card.innerHTML = '<div class="report-card-header">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' +
    '<span class="report-card-title">' + esc(d.filename) + '</span>' +
    '</div>' +
    '<div class="report-actions">' +
    '<a href="' + API + '/workspace/download/' + encodeURIComponent(d.download_path) + '" download class="agent-action-btn" style="text-decoration:none">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</a>' +
    '<button class="agent-action-btn" onclick="viewFile(\'' + ea(d.download_path) + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View</button>' +
    '</div>';
  innerEl.appendChild(card);
  scrollDown();
}

connectWS();
refreshStatus();
refreshFiles();
loadSessions();
setInterval(refreshStatus, 15000);
setInterval(refreshFiles, 30000);
</script>
</body>
</html>
