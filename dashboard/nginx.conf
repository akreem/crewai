server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Dashboard home
    location = / {
        try_files /index.html =404;
    }

    # Login page
    location = /login {
        try_files /login.html =404;
    }

    # SPA routing for /chat/{id}
    location /chat/ {
        try_files /index.html =404;
    }
}
