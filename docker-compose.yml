services:
  # ── Nginx – serves dashboard & reverse proxies API/WS ──
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    networks:
      - sentinel-net
    depends_on:
      orchestrator:
        condition: service_started

  # ── Orchestrator (LLM brain, delegates to workers via REST) ──
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY:-${OPENROUTER_API_KEY}}
      - ORCHESTRATOR_BASE_URL=${ORCHESTRATOR_BASE_URL:-https://openrouter.ai/api/v1}
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-qwen/qwen-2.5-72b-instruct}
      - WATCHMAN_URL=http://watchman:6001
      - SHIELD_URL=http://shield:6002
      - SCRIBE_URL=http://scribe:6003
    volumes:
      - ./workspace:/app/workspace
    networks:
      - sentinel-net
    depends_on:
      watchman:
        condition: service_started
      shield:
        condition: service_started
      scribe:
        condition: service_started

  # ── Watchman – autonomous system monitoring agent ──
  watchman:
    build:
      context: .
      dockerfile: watchman/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_API_KEY=${WATCHMAN_API_KEY:-${OPENROUTER_API_KEY}}
      - LLM_BASE_URL=${WATCHMAN_BASE_URL:-https://openrouter.ai/api/v1}
      - WORKER_LLM_MODEL=${WATCHMAN_LLM_MODEL:-qwen/qwen-2.5-7b-instruct}
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sentinel-net

  # ── Shield – autonomous security scanning agent (nmap, trivy, checkov) ──
  shield:
    build:
      context: .
      dockerfile: shield/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_API_KEY=${SHIELD_API_KEY:-${OPENROUTER_API_KEY}}
      - LLM_BASE_URL=${SHIELD_BASE_URL:-https://openrouter.ai/api/v1}
      - WORKER_LLM_MODEL=${SHIELD_LLM_MODEL:-qwen/qwen-2.5-7b-instruct}
    cap_add:
      - NET_RAW          # nmap needs raw sockets; avoids full privileged mode
    volumes:
      - ./workspace:/app/workspace
    networks:
      - sentinel-net

  # ── Scribe – autonomous report generation agent ──
  scribe:
    build:
      context: .
      dockerfile: scribe/Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_API_KEY=${SCRIBE_API_KEY:-${OPENROUTER_API_KEY}}
      - LLM_BASE_URL=${SCRIBE_BASE_URL:-https://openrouter.ai/api/v1}
      - WORKER_LLM_MODEL=${SCRIBE_LLM_MODEL:-qwen/qwen-2.5-7b-instruct}
    volumes:
      - ./workspace:/app/workspace
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge