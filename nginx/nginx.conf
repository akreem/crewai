upstream orchestrator {
    server orchestrator:6000;
}

upstream dashboard {
    server dashboard:80;
}

server {
    listen 80;
    server_name _;

    # ── Static pages → dashboard container (always responsive) ──

    location = / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
    }

    location = /login {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
    }

    # ── API routes → orchestrator ──

    # Auth
    location /auth/ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat POST (send message)
    location = /chat {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Chat sessions list
    location = /chat/sessions {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Chat API: /chat/{id}/messages and /chat/{id}/delete
    location ~ ^/chat/[a-f0-9-]+/(messages|delete)$ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # SPA routes: /chat/{anything} → dashboard
    location /chat/ {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Status & health
    location /status {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
    }

    # Workspace files
    location /workspace/ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Legacy command endpoint
    location /command {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
