upstream orchestrator {
    server orchestrator:6000;
}

upstream dashboard-new {
    server dashboard-new:80;
}

upstream dashboard-old {
    server dashboard:80;
}

client_max_body_size 100M;

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

# ============ HTTP → HTTPS Redirect ============
server {
    listen 80;
    server_name notebook.deployment.sh;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============ HTTPS ============
# PRIMARY: React dashboard (new)
# LEGACY:  /legacy → old dashboard
server {
    listen 443 ssl;
    server_name notebook.deployment.sh;

    ssl_certificate     /etc/letsencrypt/live/notebook.deployment.sh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notebook.deployment.sh/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Switch: old dashboard at /legacy ──
    location /legacy {
        proxy_pass http://dashboard-old/;
        proxy_set_header Host $host;
    }

    # ── API routes → orchestrator ──

    location /auth/ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /chat {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location = /chat/sessions {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/chat/[a-f0-9-]+/(messages|delete)$ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /ws/ {
        proxy_pass http://orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /status {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
    }

    location /workspace/ {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /command {
        proxy_pass http://orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ── Primary: React dashboard (catch-all) ──
    location / {
        proxy_pass http://dashboard-new;
        proxy_set_header Host $host;
    }
}
